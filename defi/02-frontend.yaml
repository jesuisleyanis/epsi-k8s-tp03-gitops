apiVersion: apps/v1
kind: Deployment
metadata:
  name: site-front
  labels: { app: site-front }
spec:
  replicas: 3
  selector: { matchLabels: { app: site-front } }
  template:
    metadata: { labels: { app: site-front } }
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports: [{ containerPort: 80 }]
          env:
            - name: API_TOKEN
              valueFrom: { secretKeyRef: { name: site-secret, key: API_TOKEN } }
            - name: APP_ENV
              valueFrom: { configMapKeyRef: { name: site-config, key: APP_ENV } }
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
          resources:
            requests: { cpu: "25m", memory: "16Mi" }
            limits:   { cpu: "100m", memory: "48Mi" }
      volumes:
        - name: html
          configMap:
            name: site-config
            items: [{ key: index.html, path: index.html }]
---
apiVersion: v1
kind: Service
metadata: { name: site-front }
spec:
  selector: { app: site-front }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: site-front
spec:
  ingressClassName: traefik
  rules:
    - host: site.192.168.252.2.nip.io
      http: { paths: [{ path: /, pathType: Prefix, backend: { service: { name: site-front, port: { number: 80 }}}}]}
