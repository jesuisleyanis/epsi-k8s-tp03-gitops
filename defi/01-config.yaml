apiVersion: v1
kind: ConfigMap
metadata:
  name: site-config
data:
  APP_ENV: "production"
  index.html: |
    <!DOCTYPE html>
    <html><head><title>TP03 Défi GitOps</title></head>
    <body style="font-family:sans-serif;text-align:center;margin-top:60px">
      <h1>🚀 Défi final TP 03 — k3s + ArgoCD</h1>
      <p>App répliquée, config via ConfigMap, secret injecté, exposée par Traefik.</p>
    </body></html>
---
# Secret (démo — en prod : Sealed Secrets / Vault, jamais en clair dans Git)
apiVersion: v1
kind: Secret
metadata:
  name: site-secret
type: Opaque
stringData:
  API_TOKEN: "demo-token-tp03"
