# Abstraction de la BDD externe via Service ExternalName.
# WordPress utilise WORDPRESS_DB_HOST=mariadb : CoreDNS renvoie un CNAME vers l'adresse externe.
# Si l'IP de la VM BDD change → on modifie uniquement ce Service, WordPress reste inchangé.
apiVersion: v1
kind: Service
metadata:
  name: mariadb
spec:
  type: ExternalName
  externalName: 192.168.252.8
