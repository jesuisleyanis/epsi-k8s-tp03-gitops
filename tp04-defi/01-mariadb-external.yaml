# Abstraction de la BDD externe : le Service "mariadb" pointe vers l'IP de la VM 192.168.252.8.
# NB: ExternalName sert pour un backend nommé (DNS). Pour un backend par IP, la forme correcte
# est un Service sans selector + Endpoints manuels (ce qui suit). Si l'IP change → on modifie
# uniquement les Endpoints, WordPress reste inchangé (il n'utilise que le nom "mariadb").
apiVersion: v1
kind: Service
metadata:
  name: mariadb
spec:
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Endpoints
metadata:
  name: mariadb          # même nom que le Service → binding
subsets:
  - addresses:
      - ip: 192.168.252.8
    ports:
      - port: 3306
