# Abstraction de la BDD externe : Service SANS selector "mariadb" → WordPress s'y connecte par
# le nom (WORDPRESS_DB_HOST=mariadb). Le binding vers l'IP réelle se fait via un objet Endpoints
# (fichier endpoints-mariadb.yaml appliqué hors ArgoCD, car ArgoCD exclut les Endpoints par défaut
# — ce sont des ressources normalement gérées par un contrôleur). Si l'IP change → on met à jour
# uniquement l'Endpoints, WordPress reste inchangé. C'est la forme correcte pour un backend par IP.
apiVersion: v1
kind: Service
metadata:
  name: mariadb
spec:
  ports:
    - port: 3306
      targetPort: 3306
